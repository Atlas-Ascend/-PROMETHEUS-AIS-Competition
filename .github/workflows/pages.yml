name: Deploy PROMETHEUS Competition Website

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate static evidence
        run: |
          python -m json.tool docs/data/demo.json > /dev/null
          python -m json.tool docs/proofgrid/FINAL_RECEIPT.json > /dev/null
          python -m json.tool docs/proofgrid/HYDRA_REPAIR_RECEIPT.json > /dev/null
          python -m json.tool docs/genomes/CAPABILITY_GENOME.json > /dev/null
          python -m json.tool docs/genomes/CAPABILITY_GENOME_REUSE.json > /dev/null
          test -s docs/index.html
          test -s docs/assets/styles.css
          test -s docs/assets/app.js
          test -s docs/screenshots/prometheus-command-center.svg

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
