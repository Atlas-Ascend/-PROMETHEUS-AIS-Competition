name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify elite public entrypoints
        run: |
          test -f index.html
          test -f docs/index.html
          test -f docs/assets/elite-demo.css
          test -f docs/assets/elite-demo.js
          grep -q 'One impossible mission. Eight systems. Three minutes.' index.html
          grep -q 'One impossible mission. Eight systems. Three minutes.' docs/index.html

      - name: Upload converged site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
