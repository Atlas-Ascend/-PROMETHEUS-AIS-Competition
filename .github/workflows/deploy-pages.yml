name: Deploy PROMETHEUS GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'index.html'
      - '.nojekyll'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: prometheus-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout competition build
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate exact 2:45 public artifact
        shell: bash
        run: |
          set -euo pipefail

          test -f docs/.nojekyll
          test -f docs/index.html
          test -f docs/assets/elite-demo.css
          test -f docs/assets/elite-demo.js
          test -f docs/proofgrid/FINAL_RECEIPT.json

          node --check docs/assets/elite-demo.js
          grep -q 'IGNITE 2:45 DEMONSTRATION' docs/index.html
          grep -q 'ELITE 2:45 COMMAND-TO-PROOF DEMONSTRATION' docs/index.html
          grep -Fq 'const duration = 165;' docs/assets/elite-demo.js
          grep -Fq "const finalClock = 'T+02:45';" docs/assets/elite-demo.js

          echo 'Exact competition artifact is ready for publication.'

      - name: Upload single authoritative Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
