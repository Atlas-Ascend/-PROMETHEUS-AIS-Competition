name: Validate PROMETHEUS Elite Demo

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "BUILD_TRUTH.md"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/operator-console-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout competition build
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify authoritative public artifact
        shell: bash
        run: |
          set -euo pipefail

          test -f docs/.nojekyll
          test -f docs/index.html
          test -f docs/assets/elite-demo.css
          test -f docs/assets/elite-demo.js
          test -f docs/assets/serverforge-case-study.css
          test -f docs/assets/serverforge-case-study.js
          test -f docs/serverforge/PUBLICATION_ENVELOPE.json
          test -f docs/data/case-study.json
          test -f docs/proofgrid/FINAL_RECEIPT.json

          node --check docs/assets/elite-demo.js
          node --check docs/assets/serverforge-case-study.js
          python -m json.tool docs/serverforge/PUBLICATION_ENVELOPE.json > /dev/null
          python -m json.tool docs/data/case-study.json > /dev/null
          python -m json.tool docs/proofgrid/FINAL_RECEIPT.json > /dev/null

          grep -q "IGNITE 2:45 DEMONSTRATION" docs/index.html
          grep -q "ELITE 2:45 COMMAND-TO-PROOF DEMONSTRATION" docs/index.html
          grep -q "GHOST ATLAS INSTITUTE · SERVERFORGE FIELD REPORT" docs/index.html
          grep -q "The proof leaves the browser through EDEN" docs/index.html
          grep -q "READY_FOR_EDEN_PUBLICATION" docs/serverforge/PUBLICATION_ENVELOPE.json
          grep -q "EDEN_LOCAL" docs/serverforge/PUBLICATION_ENVELOPE.json
          grep -Fq "const stageStarts = [0, 18, 39, 59, 77, 101, 125, 145];" docs/assets/elite-demo.js
          grep -Fq "const duration = 165;" docs/assets/elite-demo.js
          grep -Fq "const finalClock = 'T+02:45';" docs/assets/elite-demo.js

          python - <<'PY'
          import hashlib, json
          from pathlib import Path

          payload = json.loads(Path("docs/serverforge/PUBLICATION_ENVELOPE.json").read_text(encoding="utf-8"))
          expected = payload.pop("envelope_sha256")
          payload.pop("hash_scope")
          raw = json.dumps(payload, sort_keys=True, separators=(",", ":"), ensure_ascii=False).encode()
          assert hashlib.sha256(raw).hexdigest() == expected
          assert payload["security_boundary"]["credentials_embedded"] is False
          assert payload["security_boundary"]["bot_token_embedded"] is False
          print("PROMETHEUS elite demo + ServerForge envelope PASS")
          PY

          if grep -Eni "IGNITE 3:00|T\+03:00|180-second|180 seconds" docs/index.html docs/assets/elite-demo.js; then
            echo "Legacy three-minute runtime detected."
            exit 1
          fi
