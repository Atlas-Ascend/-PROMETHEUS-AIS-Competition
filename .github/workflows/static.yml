name: Deploy PROMETHEUS Operator Console

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/static.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: prometheus-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate operator console release
        run: |
          set -euo pipefail
          node --check docs/assets/app.js
          node docs/tests/demo_contract.mjs
          python docs/tests/site_integrity.py
          python -m json.tool docs/data/demo.json > /dev/null
          test -f docs/assets/operator-console.css
          test -f docs/documentation/OPERATOR_CONSOLE_TECHNICAL_SPEC.md
          test -f docs/documentation/EDEN_SERVERFORGE_CASE_STUDY.md
          grep -q "The entire proof chain, synchronized" docs/index.html
          grep -q "Eight systems, eight distinct visual languages" docs/index.html
          grep -q "From EDEN local execution to public verified evidence" docs/index.html
          grep -q "INTELLECTUAL PROPERTY BOUNDARY" docs/index.html
          test ! -f docs/assets/observatory.js
          test ! -f docs/assets/observatory.css

      - name: Stamp deployed revision
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          payload = {
            "interface": "PROMETHEUS Operator Console",
            "release": "PROMETHEUS-OPERATOR-CONSOLE-20260721",
            "revision": os.environ.get("GITHUB_SHA", "unknown"),
            "deployed_at": datetime.now(timezone.utc).isoformat(),
            "canonical_agents": ["PROMETHEUS","AIS-Ω","Adversarial Twin","SECA","HYDRA","ProofGrid","Capability Genome","Build Truth"],
            "features": [
              "run pause resume step reset and speed controls",
              "technical terminal and behavioral code comparison",
              "canonical handoff fabric and governed packets",
              "four-series global telemetry",
              "eight role-specific system visualizations",
              "EDEN and ServerForge case study",
              "explicit intellectual-property boundary",
              "full-screen proof theater",
              "verified-result fast-forward",
              "judge challenge mode"
            ]
          }
          Path("docs/deployment-status.json").write_text(json.dumps(payload, indent=2, ensure_ascii=False)+"\n", encoding="utf-8")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload operator console
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy operator console
        id: deployment
        uses: actions/deploy-pages@v4
