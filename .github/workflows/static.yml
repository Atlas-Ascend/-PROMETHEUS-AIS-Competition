name: Deploy PROMETHEUS Competition Website

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/static.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate website and public evidence
        run: |
          set -euo pipefail
          test -s docs/index.html
          test -s docs/assets/styles.css
          test -s docs/assets/app.js
          test -s docs/data/demo.json
          test -s docs/screenshots/prometheus-command-center.svg
          test -f docs/.nojekyll
          python -m json.tool docs/data/demo.json > /dev/null
          python -m json.tool docs/proofgrid/FINAL_RECEIPT.json > /dev/null
          python -m json.tool docs/proofgrid/HYDRA_REPAIR_RECEIPT.json > /dev/null
          python -m json.tool docs/genomes/CAPABILITY_GENOME.json > /dev/null
          python -m json.tool docs/genomes/CAPABILITY_GENOME_REUSE.json > /dev/null

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload PROMETHEUS static website
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
