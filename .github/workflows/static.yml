name: Deploy PROMETHEUS Competition Website

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "competition/**"
      - "pyproject.toml"
      - "README.md"
      - "LICENSE"
      - ".github/workflows/static.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install executable competition package
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit and package diagnostics
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -v 2>&1 | tee /tmp/prometheus-tests.log
          grep -Eq 'Ran [1-9][0-9]* tests?' /tmp/prometheus-tests.log
          python -m prometheus.cli doctor --json

      - name: Regenerate and verify Command-to-Proof evidence
        run: |
          set -euo pipefail
          python -m prometheus.cli demo reset
          python -m prometheus.cli demo competition
          python -m prometheus.cli receipt verify artifacts/competition-demo/FINAL_RECEIPT.json
          python -m prometheus.cli contest claims-verify
          python -m prometheus.cli contest evidence-verify
          python -m prometheus.cli contest submission-check

      - name: Validate website, proof theater and public evidence
        run: |
          set -euo pipefail
          node --check docs/assets/app.js
          node --check docs/assets/observatory.js
          node docs/tests/demo_contract.mjs
          python docs/tests/site_integrity.py
          python -m json.tool docs/data/demo.json > /dev/null
          python -m json.tool docs/proofgrid/FINAL_RECEIPT.json > /dev/null
          python -m json.tool docs/proofgrid/HYDRA_REPAIR_RECEIPT.json > /dev/null
          python -m json.tool docs/genomes/CAPABILITY_GENOME.json > /dev/null
          python -m json.tool docs/genomes/CAPABILITY_GENOME_REUSE.json > /dev/null

      - name: Check generated and public Build Truth alignment
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          generated = json.loads(Path("artifacts/competition-demo/FINAL_RECEIPT.json").read_text())
          public = json.loads(Path("docs/proofgrid/FINAL_RECEIPT.json").read_text())
          demo = json.loads(Path("docs/data/demo.json").read_text())

          assert generated["receipt_id"] == public["receipt_id"] == demo["proofgrid"]["receipt_id"]
          assert generated["mission_id"] == public["mission_id"] == demo["mission"]["id"]
          assert generated["status"] == public["status"] == demo["proofgrid"]["status"] == "verified"
          assert generated["promotion"] == public["promotion"] == demo["proofgrid"]["promotion"] == "authorized"
          assert generated["capability_genome"] == public["capability_genome"] == demo["genome"]["genome_id"]
          assert generated["tests"] == public["tests"] == demo["proofgrid"]["tests"] == {"passed": 5, "failed": 0}
          assert isinstance(generated["artifacts"], dict) and len(generated["artifacts"]) == 8
          assert len(public["artifacts"]) == 8
          assert demo["proofgrid"]["artifacts_verified"] == demo["proofgrid"]["artifacts_total"] == 8
          print("PROMETHEUS Build Truth alignment PASS")
          PY

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload PROMETHEUS static website
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
