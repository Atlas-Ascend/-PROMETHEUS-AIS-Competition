name: Deploy PROMETHEUS Competition Website

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/static.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: prometheus-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate unified judge interface
        run: |
          set -euo pipefail
          node --check docs/assets/app.js
          node docs/tests/demo_contract.mjs
          python docs/tests/site_integrity.py
          test -f docs/assets/unified.css
          test ! -f docs/assets/observatory.js
          test ! -f docs/assets/observatory.css
          grep -q "The entire proof chain, synchronized" docs/index.html
          grep -q "Eight canonical agents, eight living graphs" docs/index.html

      - name: Stamp deployed revision
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          payload = {
              "interface": "PROMETHEUS Unified Command-to-Proof Mission Cockpit",
              "revision": os.environ.get("GITHUB_SHA", "unknown"),
              "deployed_at": datetime.now(timezone.utc).isoformat(),
              "canonical_agents": [
                  "PROMETHEUS", "AIS-Ω", "Adversarial Twin", "SECA",
                  "HYDRA", "ProofGrid", "Capability Genome", "Build Truth"
              ],
              "features": [
                  "side-by-side terminal and theater",
                  "agent handoff fabric",
                  "moving packets",
                  "global telemetry",
                  "eight living agent graphs",
                  "judge challenge mode",
                  "verified-result skip"
              ]
          }
          Path("docs/deployment-status.json").write_text(
              json.dumps(payload, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload latest docs directory
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy latest unified interface
        id: deployment
        uses: actions/deploy-pages@v4
